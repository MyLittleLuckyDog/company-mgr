name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # macOS: SDK 필요 → macOS runner에서 네이티브/크로스 빌드
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: company-mgr-darwin-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            asset: company-mgr-darwin-amd64
          # Linux: zigbuild으로 크로스컴파일
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: company-mgr-linux-amd64
            use_zigbuild: true
          # Windows: zigbuild GNU 툴체인
          - os: ubuntu-latest
            target: x86_64-pc-windows-gnu
            asset: company-mgr-windows-amd64.exe
            use_zigbuild: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cargo-zigbuild (Linux/Windows only)
        if: matrix.use_zigbuild
        run: |
          pip3 install ziglang
          cargo install cargo-zigbuild

      - name: Build (zigbuild)
        if: matrix.use_zigbuild
        run: cargo zigbuild --release --target ${{ matrix.target }}

      - name: Build (native cargo)
        if: "!matrix.use_zigbuild"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifact
        run: |
          SRC="target/${{ matrix.target }}/release/company-mgr"
          [[ "${{ matrix.target }}" == *windows* ]] && SRC="${SRC}.exe"
          cp "$SRC" "${{ matrix.asset }}"
        shell: bash

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}
